name: Build Android Remote APK

on:
  pull_request:
    paths:
      - 'android-remote/**'
      - '.github/workflows/android-remote-apk.yml'
  push:
    branches: [main]
    paths:
      - 'android-remote/**'
      - '.github/workflows/android-remote-apk.yml'
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-remote
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Test and build debug APK
        run: ./gradlew testDebugUnitTest assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: 7B-Score-Remote-debug
          path: android-remote/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Prepare release signing
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          mkdir -p signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/7b-remote-release.p12
          printf 'storeFile=signing/7b-remote-release.p12\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" "$ANDROID_KEYSTORE_PASSWORD" > keystore.properties
      - name: Build signed release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: 7B-Score-Remote-release
          path: android-remote/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

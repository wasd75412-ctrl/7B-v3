[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Firebase web API keys are public client configuration, not server secrets.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyBrakbTPK7UqEChPBI6pM8-i03IcLq0IvM"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "screen-wake-lock=(self)"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
